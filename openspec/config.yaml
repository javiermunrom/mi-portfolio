schema: spec-driven

context: |
  Proyecto: portfolio personal con Astro 6, TypeScript y Tailwind CSS 4.
  Idioma principal del contenido y de la interfaz: espanol.
  Rutas actuales: /, /projects y /projects/[slug].
  El contenido de proyectos se gestiona con Astro Content Collections en src/content/projects/.
  Mantener cambios pequenos, claros y consistentes con la estructura existente.

rules:
  proposal:
    - Describe el cambio en espanol.
    - Indica claramente el impacto en rutas, contenido o componentes.
  specs:
    - Usa escenarios Given/When/Then.
    - Refleja solo comportamiento funcional visible o reglas de contenido.
  design:
    - Prioriza soluciones pequenas sobre nuevas abstracciones.
  tasks:
    - Divide el trabajo por archivos o areas concretas del proyecto.
